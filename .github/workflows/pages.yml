name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      PAGES_ARTIFACT_NAME: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
      FIREBASE_API_KEY: ${{ vars.FIREBASE_API_KEY }}
      FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN }}
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      FIREBASE_STORAGE_BUCKET: ${{ vars.FIREBASE_STORAGE_BUCKET }}
      FIREBASE_MESSAGING_SENDER_ID: ${{ vars.FIREBASE_MESSAGING_SENDER_ID }}
      FIREBASE_APP_ID: ${{ vars.FIREBASE_APP_ID }}
      FIREBASE_SDK_BASE: ${{ vars.FIREBASE_SDK_BASE || 'https://www.gstatic.com/firebasejs/10.12.5' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve project directory
        id: project
        shell: bash
        run: |
          set -euo pipefail

          project_dir="."
          has_package="false"

          if [[ -f package.json ]]; then
            project_dir="."
            has_package="true"
          else
            mapfile -t package_files < <(find . -maxdepth 5 -name package.json -not -path "*/node_modules/*" -not -path "*/.git/*" | sort)

            if [[ "${#package_files[@]}" -gt 1 ]]; then
              echo "Expected at most one package.json, found ${#package_files[@]}."
              printf '%s\n' "${package_files[@]}"
              exit 1
            fi

            if [[ "${#package_files[@]}" -eq 1 ]]; then
              project_dir="$(dirname "${package_files[0]}")"
              has_package="true"
            fi
          fi

          static_dirs=()

          if [[ -f "$project_dir/web/index.html" ]]; then
            static_dirs+=("$project_dir/web")
          fi

          if [[ -f "$project_dir/index.html" ]]; then
            static_dirs+=("$project_dir")
          fi

          if [[ "${#static_dirs[@]}" -eq 0 ]]; then
            mapfile -t static_dirs < <(find "$project_dir" -maxdepth 5 -name index.html -not -path "*/node_modules/*" -not -path "*/.git/*" -exec dirname {} \; | sort -u)
          fi

          if [[ "${#static_dirs[@]}" -ne 1 ]]; then
            echo "Expected exactly one static app directory containing index.html, found ${#static_dirs[@]}."
            printf '%s\n' "${static_dirs[@]}"
            echo "Repository root contents:"
            find . -maxdepth 2 -not -path "*/.git/*" | sort
            exit 1
          fi

          static_dir="${static_dirs[0]}"

          if [[ ! -f "$static_dir/app.js" ]]; then
            echo "Expected app.js next to index.html in $static_dir."
            exit 1
          fi

          echo "dir=$project_dir" >> "$GITHUB_OUTPUT"
          echo "web=$static_dir" >> "$GITHUB_OUTPUT"
          echo "has_package=$has_package" >> "$GITHUB_OUTPUT"
          echo "Using project directory: $project_dir"
          echo "Using static app directory: $static_dir"
          echo "Package scripts available: $has_package"

      - name: Set up Node
        if: steps.project.outputs.has_package == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        if: steps.project.outputs.has_package == 'true'
        working-directory: ${{ steps.project.outputs.dir }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Test
        if: steps.project.outputs.has_package == 'true'
        working-directory: ${{ steps.project.outputs.dir }}
        run: npm test

      - name: Build vocab seed artifact
        if: steps.project.outputs.has_package == 'true'
        working-directory: ${{ steps.project.outputs.dir }}
        run: npm run seed:vocab

      - name: Verify Firebase Pages config
        run: |
          test -n "$FIREBASE_API_KEY"
          test -n "$FIREBASE_AUTH_DOMAIN"
          test -n "$FIREBASE_PROJECT_ID"
          test -n "$FIREBASE_STORAGE_BUCKET"
          test -n "$FIREBASE_MESSAGING_SENDER_ID"
          test -n "$FIREBASE_APP_ID"

      - name: Write production Firebase config
        env:
          STATIC_DIR: ${{ steps.project.outputs.web }}
        run: |
          cat > "$STATIC_DIR/firebase-config.js" <<EOF
          window.JLPT_FIREBASE_CONFIG = {
            apiKey: "$FIREBASE_API_KEY",
            authDomain: "$FIREBASE_AUTH_DOMAIN",
            projectId: "$FIREBASE_PROJECT_ID",
            storageBucket: "$FIREBASE_STORAGE_BUCKET",
            messagingSenderId: "$FIREBASE_MESSAGING_SENDER_ID",
            appId: "$FIREBASE_APP_ID"
          };
          window.JLPT_REQUIRE_GOOGLE_SIGN_IN = true;
          window.JLPT_FIREBASE_SDK_BASE = "$FIREBASE_SDK_BASE";
          EOF
          touch "$STATIC_DIR/.nojekyll"

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: ${{ env.PAGES_ARTIFACT_NAME }}
          path: ${{ steps.project.outputs.web }}
          include-hidden-files: true

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: ${{ env.PAGES_ARTIFACT_NAME }}
